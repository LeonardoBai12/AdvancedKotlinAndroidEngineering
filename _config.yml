theme: just-the-docs

# -------------------------
# Site metadata
# -------------------------
title: Advanced Kotlin & Android Engineering
description: >-
  Comprehensive reference covering Kotlin, data structures, concurrency,
  the Android application layer, architecture, testing, and tooling.

url: "https://leonardobai12.github.io"
baseurl: "/AdvancedKotlinAndroidEngineering"

lang: en
timezone: America/Sao_Paulo

# -------------------------
# Just-the-Docs settings
# -------------------------
color_scheme: dark
search_enabled: true
heading_anchors: true

aux_links:
  "GitHub":
    - "https://github.com/LeonardoBai12/AdvancedKotlinAndroidEngineering"

# -------------------------
# Jekyll build settings
# -------------------------
permalink: pretty

exclude:
  - "*.gem"
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
  - README.md
  - root.md
  - add_jtd_frontmatter.py
  - node_modules
  - vendor
  - .bundle
  - .sass-cache
  - .jekyll-cache

# Markdown processor
markdown: kramdown
highlighter: rouge

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# -------------------------
# Plugins
# -------------------------
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
